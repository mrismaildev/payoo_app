<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <main
        class="min-h-screen flex items-center justify-center bg-gradient-to-br from-neutral-900 via-neutral-800 to-neutral-900">

        <div class="mockup-phone border-primary">
            <div class="mockup-phone-camera"></div>

            <div class="mockup-phone-display bg-neutral-950 text-white grid place-content-center px-6">

                <form class="w-80 space-y-6">

                    <!-- Header -->
                    <div class="text-center">
                        <h2 class="text-2xl font-bold">Welcome Back</h2>
                        <p class="text-sm text-neutral-400 mt-1">Login to continue</p>
                    </div>

                    <!-- Card -->
                    <div class="card bg-neutral-900 shadow-2xl border border-neutral-800">
                        <div class="card-body p-6 space-y-4">

                            <!-- Phone -->
                            <div>
                                <label class="label text-sm text-neutral-400">Phone Number</label>
                                <input id="phoneNumbers" type="text" name="phone" required
                                    placeholder="Enter your phone number"
                                    class="input input-bordered w-full bg-neutral-800 border-neutral-700 focus:border-primary focus:outline-none" />
                            </div>

                            <!-- Pin -->
                            <div>
                                <label class="label text-sm text-neutral-400">Pin</label>
                                <input id="pinNumber" type="password" name="pin" required placeholder="Enter your pin"
                                    class="input input-bordered w-full bg-neutral-800 border-neutral-700 focus:border-primary focus:outline-none" />
                            </div>

                            <!-- Forgot -->
                            <div class="text-right">
                                <a href="#" class="text-xs text-primary hover:underline">
                                    Forgot password?
                                </a>
                            </div>

                            <!-- Button -->
                            <button id="btnLogin" type="submit"
                                class="btn btn-primary w-full hover:scale-[1.02] transition">
                                Login
                            </button>

                        </div>
                    </div>

                    <!-- Footer -->
                    <p class="text-center text-xs text-neutral-500">
                        Don’t have an account?
                        <a href="#" class="text-primary hover:underline">
                            Sign up
                        </a>
                    </p>

                </form>

            </div>
        </div>
    </main>

    <script src="./js/login.js"></script>
</body>

</html>
